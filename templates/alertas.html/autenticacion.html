<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Sistema IoT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0F1923;
      --panel:  #1A2B38;
      --card:   #1E3244;
      --accent: #2E86AB;
      --red:    #F05D5E;
      --text:   #E8EDF2;
      --muted:  #7A9BB5;
      --border: #2A3F52;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-name {
      font-size: 18px;
      font-weight: 700;
    }
    .logo-name span { color: var(--accent); }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .alert {
      background: #F05D5E18;
      border-left: 3px solid var(--red);
      border-radius: 0 8px 8px 0;
      padding: 11px 14px;
      font-size: 14px;
      color: var(--red);
      margin-bottom: 24px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #2E86AB22;
    }
    input::placeholder { color: var(--muted); opacity: 0.5; }
    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #2575A0; }
    .btn:active { transform: scale(0.99); }
    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-name">Sistema<span>IoT</span></div>
    </div>

    <h1>Bienvenido</h1>
    <p class="subtitle">Accede al panel de control del laboratorio.</p>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="field">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username"
               placeholder="tu_usuario" autocomplete="username" required>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn">Iniciar sesión</button>
    </form>

    <div class="footer">
      Instituto Superior Tecnológico Tecnoecuatoriano<br>
      Laboratorios de Cómputo
    </div>

  </div>
</body>
</html>
